name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  discover_examples:
    name: Discover example projects
    runs-on: ubuntu-latest
    outputs:
      example_matrix: ${{ steps.discover.outputs.example_matrix }}
      example_count: ${{ steps.discover.outputs.example_count }}
    steps:
      - uses: actions/checkout@v4

      - id: discover
        name: Find all apps automatically
        shell: bash
        run: |
          set -euo pipefail

          python - << 'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["GITHUB_WORKSPACE"])
          examples = []
          seen_paths = set()

          for manifest in sorted(root.glob("*/idf_component.yml")):
              component_dir = manifest.parent
              for apps_dir_name in ("examples", "test_apps"):
                  apps_root = component_dir / apps_dir_name
                  if not apps_root.is_dir():
                      continue

                  # Primary strategy: discover app roots from idf_component.yml files in app trees.
                  # Typical layout is <apps_dir>/<app>/main/idf_component.yml.
                  for idf_manifest in sorted(apps_root.glob("**/idf_component.yml")):
                      app_dir = idf_manifest.parent.parent if idf_manifest.parent.name == "main" else idf_manifest.parent
                      app_cmake = app_dir / "CMakeLists.txt"
                      if not app_cmake.is_file():
                          continue

                      rel_path = str(app_dir.relative_to(root)).replace("\\", "/")
                      if rel_path in seen_paths:
                          continue
                      seen_paths.add(rel_path)
                      examples.append({"component": component_dir.name, "example_path": rel_path})

                  # Fallback: direct app folders with CMakeLists.txt + main/.
                  for app_dir in sorted(path for path in apps_root.iterdir() if path.is_dir()):
                      if not (app_dir / "CMakeLists.txt").is_file():
                          continue
                      if not (app_dir / "main").is_dir():
                          continue

                      rel_path = str(app_dir.relative_to(root)).replace("\\", "/")
                      if rel_path in seen_paths:
                          continue
                      seen_paths.add(rel_path)
                      examples.append({"component": component_dir.name, "example_path": rel_path})

          matrix_json = json.dumps(examples)
          output_file = Path(os.environ["GITHUB_OUTPUT"])
          with output_file.open("a", encoding="utf-8") as f:
              f.write(f"example_matrix={matrix_json}\n")
              f.write(f"example_count={len(examples)}\n")

          print(f"Discovered {len(examples)} example(s)")
          for item in examples:
              print(f" - {item['component']}: {item['example_path']}")
          PY

      - name: Fail when no apps found
        if: ${{ steps.discover.outputs.example_count == '' || steps.discover.outputs.example_count == '0' }}
        shell: bash
        run: |
          echo "Discovery output example_count=${{ steps.discover.outputs.example_count }}"
          echo "Discovery output example_matrix=${{ steps.discover.outputs.example_matrix }}"
          echo "No apps were discovered. Add at least one app under <component>/examples/* or <component>/test_apps/*"
          echo "Top-level component manifests:"
          find . -maxdepth 2 -name idf_component.yml -print | sed 's#^./##'
          echo "App manifests found under examples/test_apps:"
          find . -type f -name idf_component.yml | grep -E '/examples/|/test_apps/' || true
          exit 1

  build:
    name: Build ${{ matrix.example.component }} / ${{ matrix.example.example_path }} (${{ matrix.idf_version }} / ${{ matrix.idf_target }})
    runs-on: ubuntu-latest
    needs: discover_examples
    strategy:
      fail-fast: false
      matrix:
        idf_version:
          - "release-v5.1"
          - "release-v5.2"
          - "release-v5.3"
          - "release-v5.4"
          - "release-v5.5"
          - "latest"
        idf_target:
          - esp32
          - esp32s3
        example: ${{ fromJson(needs.discover_examples.outputs.example_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - id: compatibility
        name: Check IDF compatibility for this component
        shell: bash
        run: |
          set -euo pipefail

          python - << 'PY'
          import os
          import re
          from pathlib import Path

          component = os.environ["COMPONENT"]
          idf_version = os.environ["IDF_VERSION"]
          root = Path(os.environ["GITHUB_WORKSPACE"])
          manifest = root / component / "idf_component.yml"

          should_build = True
          reason = "supported"

          if manifest.is_file():
              text = manifest.read_text(encoding="utf-8")
              m = re.search(r"(?m)^\s*idf\s*:\s*[\"']?([^\"'\n]+)", text)
              requirement = m.group(1).strip() if m else ""

              if idf_version != "latest" and requirement.startswith(">="):
                  req = requirement[2:].strip()
                  req_match = re.match(r"^(\d+)\.(\d+)", req)
                  idf_match = re.match(r"^release-v(\d+)\.(\d+)$", idf_version)
                  if req_match and idf_match:
                      req_major, req_minor = map(int, req_match.groups())
                      ver_major, ver_minor = map(int, idf_match.groups())
                      if (ver_major, ver_minor) < (req_major, req_minor):
                          should_build = False
                          reason = f"requires idf {requirement}, got {idf_version}"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as f:
              f.write(f"should_build={'true' if should_build else 'false'}\n")
              f.write(f"reason={reason}\n")

          print(f"Component: {component}")
          print(f"IDF version: {idf_version}")
          print(f"Decision: {'build' if should_build else 'skip'} ({reason})")
          PY
        env:
          COMPONENT: ${{ matrix.example.component }}
          IDF_VERSION: ${{ matrix.idf_version }}

      - name: Skip unsupported IDF combination
        if: ${{ steps.compatibility.outputs.should_build != 'true' }}
        run: |
          echo "Skipping unsupported combination: ${{ steps.compatibility.outputs.reason }}"

      - name: Build example with ESP-IDF CI action
        if: ${{ steps.compatibility.outputs.should_build == 'true' }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: ${{ matrix.idf_target }}
          path: ${{ matrix.example.example_path }}

  discover_test_apps:
    name: Discover test apps
    runs-on: ubuntu-latest
    outputs:
      test_matrix: ${{ steps.discover.outputs.test_matrix }}
      test_count: ${{ steps.discover.outputs.test_count }}
    steps:
      - uses: actions/checkout@v4

      - id: discover
        name: Find all test apps automatically
        shell: bash
        run: |
          set -euo pipefail

          python - << 'PY'
          import json
          import os
          import re
          from pathlib import Path

          root = Path(os.environ["GITHUB_WORKSPACE"])
          tests = []
          supported_qemu_targets = {"esp32", "esp32c3"}
          target_mark_re = re.compile(r"@pytest\.mark\.(esp32|esp32s2|esp32s3|esp32c2|esp32c3|esp32c6|esp32h2|esp32p4)")

          for manifest in sorted(root.glob("*/idf_component.yml")):
              component_dir = manifest.parent
              tests_root = component_dir / "test_apps"
              if not tests_root.is_dir():
                  continue

              for app_dir in sorted(path for path in tests_root.iterdir() if path.is_dir()):
                  if not (app_dir / "CMakeLists.txt").is_file():
                      continue
                  if not (app_dir / "main").is_dir():
                      continue
                  pytest_files = list(app_dir.glob("pytest*.py"))
                  if not pytest_files:
                      continue

                  discovered_targets = []
                  for pytest_file in pytest_files:
                      text = pytest_file.read_text(encoding="utf-8")
                      discovered_targets.extend(target_mark_re.findall(text))

                  targets = sorted(set(discovered_targets)) if discovered_targets else ["esp32"]
                  rel_path = str(app_dir.relative_to(root)).replace("\\", "/")

                  for target in targets:
                      tests.append(
                          {
                              "component": component_dir.name,
                              "test_path": rel_path,
                              "qemu_target": target,
                              "qemu_supported": target in supported_qemu_targets,
                          }
                      )

          output_file = Path(os.environ["GITHUB_OUTPUT"])
          with output_file.open("a", encoding="utf-8") as f:
              f.write(f"test_matrix={json.dumps(tests)}\\n")
              f.write(f"test_count={len(tests)}\\n")

          print(f"Discovered {len(tests)} test app(s)")
          for item in tests:
              print(f" - {item['component']}: {item['test_path']} ({item['qemu_target']}, qemu_supported={item['qemu_supported']})")
          PY

  pytest_qemu:
    name: Test ${{ matrix.test.component }} / ${{ matrix.test.test_path }} (${{ matrix.idf_version }} / ${{ matrix.test.qemu_target }})
    runs-on: ubuntu-latest
    needs: discover_test_apps
    if: ${{ needs.discover_test_apps.outputs.test_count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        idf_version:
          - "release-v5.1"
          - "release-v5.2"
          - "release-v5.3"
          - "release-v5.4"
          - "release-v5.5"
          - "latest"
        test: ${{ fromJson(needs.discover_test_apps.outputs.test_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - id: compatibility
        name: Check IDF compatibility for this component
        shell: bash
        run: |
          set -euo pipefail

          python - << 'PY'
          import os
          import re
          from pathlib import Path

          component = os.environ["COMPONENT"]
          idf_version = os.environ["IDF_VERSION"]
          root = Path(os.environ["GITHUB_WORKSPACE"])
          manifest = root / component / "idf_component.yml"

          should_test = True
          reason = "supported"

          if manifest.is_file():
              text = manifest.read_text(encoding="utf-8")
              m = re.search(r"(?m)^\s*idf\s*:\s*[\"']?([^\"'\n]+)", text)
              requirement = m.group(1).strip() if m else ""

              if idf_version != "latest" and requirement.startswith(">="):
                  req = requirement[2:].strip()
                  req_match = re.match(r"^(\d+)\.(\d+)", req)
                  idf_match = re.match(r"^release-v(\d+)\.(\d+)$", idf_version)
                  if req_match and idf_match:
                      req_major, req_minor = map(int, req_match.groups())
                      ver_major, ver_minor = map(int, idf_match.groups())
                      if (ver_major, ver_minor) < (req_major, req_minor):
                          should_test = False
                          reason = f"requires idf {requirement}, got {idf_version}"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as f:
              f.write(f"should_test={'true' if should_test else 'false'}\\n")
              f.write(f"reason={reason}\\n")

          print(f"Component: {component}")
          print(f"IDF version: {idf_version}")
          print(f"Decision: {'run' if should_test else 'skip'} ({reason})")
          PY
        env:
          COMPONENT: ${{ matrix.test.component }}
          IDF_VERSION: ${{ matrix.idf_version }}

      - name: Skip unsupported IDF combination
        if: ${{ steps.compatibility.outputs.should_test != 'true' }}
        run: |
          echo "Skipping unsupported test combination: ${{ steps.compatibility.outputs.reason }}"

      - name: Skip unsupported QEMU target
        if: ${{ steps.compatibility.outputs.should_test == 'true' && !matrix.test.qemu_supported }}
        run: |
          echo "Skipping QEMU run for target '${{ matrix.test.qemu_target }}' (not supported by this workflow)"

      - name: Run tests in QEMU
        if: ${{ steps.compatibility.outputs.should_test == 'true' && matrix.test.qemu_supported }}
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/project" \
            -w "/project/${{ matrix.test.test_path }}" \
            "espressif/idf:${{ matrix.idf_version }}" \
            bash -lc "python -m pip install --upgrade pip && python -m pip install pytest pytest-embedded pytest-embedded-idf && idf.py set-target ${{ matrix.test.qemu_target }} build && pytest -q --target ${{ matrix.test.qemu_target }} --embedded-services qemu"

