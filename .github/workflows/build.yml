name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  discover_examples:
    name: Discover example projects
    runs-on: ubuntu-latest
    outputs:
      example_matrix: ${{ steps.discover.outputs.example_matrix }}
      example_count: ${{ steps.discover.outputs.example_count }}
    steps:
      - uses: actions/checkout@v4

      - id: discover
        name: Find all examples automatically
        shell: bash
        run: |
          set -euo pipefail

          python - << 'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["GITHUB_WORKSPACE"])
          examples = []

          for manifest in sorted(root.glob("*/idf_component.yml")):
              component_dir = manifest.parent
              examples_root = component_dir / "examples"
              if not examples_root.is_dir():
                  continue

              for cmake_file in sorted(examples_root.glob("**/CMakeLists.txt")):
                  example_dir = cmake_file.parent
                  if (example_dir / "main").is_dir() and (example_dir / "CMakeLists.txt").is_file():
                      examples.append(
                          {
                              "component": component_dir.name,
                              "example_path": str(example_dir.relative_to(root)).replace("\\\\", "/"),
                          }
                      )

          matrix_json = json.dumps(examples)
          output_file = Path(os.environ["GITHUB_OUTPUT"])
          with output_file.open("a", encoding="utf-8") as f:
              f.write(f"example_matrix={matrix_json}\\n")
              f.write(f"example_count={len(examples)}\\n")

          print(f"Discovered {len(examples)} example(s)")
          for item in examples:
              print(f" - {item['component']}: {item['example_path']}")
          PY

      - name: Fail when no examples found
        if: ${{ steps.discover.outputs.example_count == '0' }}
        run: |
          echo "No examples were discovered. Add at least one example under <component>/examples/*"
          exit 1

  build:
    name: Build ${{ matrix.example.component }} / ${{ matrix.example.example_path }} (${{ matrix.idf_version }} / ${{ matrix.idf_target }})
    runs-on: ubuntu-latest
    needs: discover_examples
    strategy:
      fail-fast: false
      matrix:
        idf_version:
          - "release-v5.1"
          - "release-v5.2"
          - "release-v5.3"
          - "release-v5.4"
          - "release-v5.5"
          - "latest"
        idf_target:
          - esp32
          - esp32s3
        example: ${{ fromJson(needs.discover_examples.outputs.example_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build example in Espressif Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/project" \
            -w "/project/${{ matrix.example.example_path }}" \
            "espressif/idf:${{ matrix.idf_version }}" \
            bash -lc "idf.py set-target ${{ matrix.idf_target }} build"

